<!-- Pagefind 검색 UI: 빌드 시 GitHub Actions가 /pagefind/ 인덱스를 생성합니다.
     (로컬 `jekyll serve`만 돌릴 때는 인덱스가 없어 동작하지 않는 것이 정상) -->
<link href="/pagefind/pagefind-ui.css" rel="stylesheet">
<script src="/pagefind/pagefind-ui.js"></script>

<div id="search" class="pagefind-search"></div>

<script>
  window.addEventListener('DOMContentLoaded', () => {
    const ui = new PagefindUI({
      element: "#search",
      showSubResults: true,
      showImages: false,
      pageSize: 8,
      translations: {
        placeholder: "검색어를 입력하세요",
        clear_search: "지우기",
        load_more: "더 보기",
        search_label: "사이트 검색",
        zero_results: "\"[SEARCH_TERM]\"에 대한 결과가 없습니다",
        many_results: "\"[SEARCH_TERM]\" 검색 결과 [COUNT]개",
        one_result: "\"[SEARCH_TERM]\" 검색 결과 [COUNT]개",
        searching: "\"[SEARCH_TERM]\" 검색 중..."
      }
    });

    // 사이드바 검색창에서 ?q=... 로 넘어온 경우 자동 검색
    const q = new URLSearchParams(window.location.search).get("q");
    if (q) ui.triggerSearch(q);
  });
</script>
