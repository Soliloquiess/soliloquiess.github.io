<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="o" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#fb923c"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:12.5px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:10.5px;fill:#64748b;text-anchor:middle}
    .k{font-family:'Consolas','Courier New',monospace;font-size:11.5px;fill:#a855f7}
    .v{font-family:'Consolas','Courier New',monospace;font-size:11.5px;fill:#334155}
    .lbl{font-size:12px;font-weight:700;text-anchor:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .badge{font-size:10.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">OMC의 매서운 눈 — visual-verdict</text>
  <text class="sub" x="40" y="74">생성 UI 스크린샷을 레퍼런스와 대조해 엄격한 JSON verdict 반환 (OMC 플러그인)</text>
  <rect x="742" y="30" width="116" height="28" rx="14" fill="#f5f3ff"/><text class="badge" x="800" y="45" fill="#7c3aed">OMC 플러그인</text>

  <!-- inputs -->
  <rect x="40" y="112" width="170" height="70" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="125" y="140">레퍼런스 이미지</text><text class="bs" x="125" y="162">reference_images[]</text>
  <rect x="40" y="196" width="170" height="70" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="125" y="224">생성 스크린샷</text><text class="bs" x="125" y="246">generated_screenshot</text>

  <!-- compare -->
  <rect x="256" y="152" width="130" height="74" rx="14" fill="#f5f3ff" stroke="#ddd6fe" filter="url(#sh)"/><text class="bt" x="321" y="184" fill="#7c3aed">대조·판정</text><text class="bs" x="321" y="204">visual-verdict</text>
  <path d="M210 147 L254 175" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>
  <path d="M210 231 L254 203" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- JSON verdict -->
  <rect x="430" y="108" width="430" height="172" rx="14" fill="#0f172a" filter="url(#sh)"/>
  <text x="450" y="134" font-size="11" fill="#94a3b8" font-family="'Consolas',monospace">JSON verdict (only)</text>
  <text class="k" x="450" y="158">"score":</text><text class="v" x="530" y="158">0–100 (임계 90+)</text>
  <text class="k" x="450" y="180">"verdict":</text><text class="v" x="540" y="180">pass / revise / fail</text>
  <text class="k" x="450" y="202">"category_match":</text><text class="v" x="610" y="202">true/false</text>
  <text class="k" x="450" y="224">"differences":</text><text class="v" x="575" y="224">[ 구체적 시각 불일치 ]</text>
  <text class="k" x="450" y="246">"suggestions":</text><text class="v" x="575" y="246">[ 다음 편집안 ]</text>
  <text class="k" x="450" y="268">"reasoning":</text><text class="v" x="555" y="268">1–2문장 요약</text>
  <path d="M386 189 L428 189" stroke="#94a3b8" stroke-width="1.8" marker-end="url(#a)"/>

  <!-- decision + loop -->
  <rect x="256" y="304" width="180" height="52" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/><text class="bt" x="346" y="330">score ≥ 90 ?</text><text class="bs" x="346" y="348">통과 임계</text>
  <path d="M600 280 C600 320, 438 320, 436 322" fill="none" stroke="#94a3b8" stroke-width="1.6" stroke-dasharray="4 3" marker-end="url(#a)"/>
  <!-- revise loop back to generated -->
  <path d="M256 340 C150 340, 125 300, 125 268" fill="none" stroke="#fb923c" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#o)"/>
  <text class="lbl" x="180" y="316" fill="#ea580c">revise: 편집 후 재실행</text>
  <!-- pass -->
  <rect x="470" y="306" width="150" height="46" rx="12" fill="#16a34a" filter="url(#sh)"/><text class="bt" x="545" y="334" fill="#fff">pass · 완료</text>
  <path d="M436 330 L468 330" stroke="#4ade80" stroke-width="2" marker-end="url(#g)"/>

  <text class="bs" x="450" y="392" fill="#94a3b8">픽셀 diff(pixelmatch)는 보조 디버그일 뿐, verdict가 최종 결정 · QA 자동화(28번)의 시각 축</text>

  <!-- footer -->
  <circle cx="46" cy="440" r="11" fill="#a855f7"/><text x="46" y="441" class="fp" fill="#fff" font-size="11">29</text>
  <rect x="66" y="437" width="60" height="5" rx="2.5" fill="#a855f7"/><rect x="130" y="437" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="444" text-anchor="end">Claude 정리 노트 · visual-verdict</text>
</svg>
