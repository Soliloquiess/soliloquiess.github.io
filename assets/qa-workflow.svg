<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:13px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:10.5px;fill:#64748b;text-anchor:middle}
    .step{font-size:10.5px;font-weight:700;fill:#b45309;text-anchor:middle}
    .lbl{font-size:12px;font-weight:700;text-anchor:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .pr{font-size:12px;font-weight:700;fill:#334155;text-anchor:middle}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">QA 자동화 워크플로우 설계</text>
  <text class="sub" x="40" y="74">기능 검증 + 시각 검증을 자동 평가기로 묶어 "될 때까지" 반복</text>
  <circle cx="852" cy="44" r="16" fill="#f59e0b"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">28</text>

  <!-- pipeline -->
  <rect x="36" y="120" width="150" height="80" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="111" y="150">코드 변경</text><text class="bs" x="111" y="172">사람 또는 에이전트</text>
  <rect x="222" y="120" width="160" height="80" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="step" x="302" y="144">① 기능 검증</text><text class="bt" x="302" y="164">빌드·린트·테스트</text><text class="bs" x="302" y="184">UltraQA (24번)</text>
  <rect x="418" y="120" width="160" height="80" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="step" x="498" y="144">② 시각 검증</text><text class="bt" x="498" y="164">스크린샷 대조</text><text class="bs" x="498" y="184">visual-verdict(29) · CDP(30)</text>
  <rect x="614" y="120" width="160" height="80" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="step" x="694" y="144">③ 완료 근거</text><text class="bt" x="694" y="164">검증 통과 확인</text><text class="bs" x="694" y="184">verifier · /verify</text>
  <path d="M186 160 L220 160" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M382 160 L416 160" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M578 160 L612 160" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>

  <!-- decision -->
  <rect x="614" y="232" width="160" height="54" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/><text class="bt" x="694" y="258">종료 조건 충족?</text><text class="bs" x="694" y="276">테스트 + 시각 verdict</text>
  <path d="M694 200 L694 230" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <!-- No loop back -->
  <path d="M614 259 C360 259, 302 259, 302 202" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text class="lbl" x="430" y="252" fill="#b45309">No → 반복 (엔진: /loop · Goal · Ralph)</text>
  <!-- Yes done -->
  <rect x="618" y="316" width="156" height="44" rx="12" fill="#16a34a" filter="url(#sh)"/><text class="bt" x="696" y="344" fill="#fff">통과 → 완료</text>
  <path d="M694 286 L694 314" stroke="#4ade80" stroke-width="2" marker-end="url(#g)"/>
  <text class="lbl" x="720" y="306" fill="#16a34a">Yes</text>

  <!-- principles -->
  <rect x="36" y="232" width="540" height="128" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="pr" x="306" y="258" font-size="13">설계 4원칙</text>
  <rect x="56" y="272" width="248" height="34" rx="9" fill="#fef3c7"/><text class="bs" x="180" y="293" fill="#92400e">① 측정 가능한 명확한 종료 조건</text>
  <rect x="312" y="272" width="248" height="34" rx="9" fill="#fef3c7"/><text class="bs" x="436" y="293" fill="#92400e">② 작성 / 검수 분리 (24번)</text>
  <rect x="56" y="314" width="248" height="34" rx="9" fill="#fef3c7"/><text class="bs" x="180" y="335" fill="#92400e">③ 기능 + 시각 이중 검증</text>
  <rect x="312" y="314" width="248" height="34" rx="9" fill="#fef3c7"/><text class="bs" x="436" y="335" fill="#92400e">④ 반복 안전장치 (최대 횟수·비용)</text>

  <text class="bs" x="450" y="392" fill="#94a3b8">Autopilot(25번)의 Phase 3(QA) + Phase 4(Validation)가 이 설계의 완성형 구현</text>

  <!-- footer -->
  <circle cx="46" cy="440" r="11" fill="#f59e0b"/><text x="46" y="441" class="fp" fill="#fff" font-size="11">28</text>
  <rect x="66" y="437" width="60" height="5" rx="2.5" fill="#f59e0b"/><rect x="130" y="437" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="444" text-anchor="end">Claude 정리 노트 · QA 자동화 설계</text>
</svg>
