<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 490" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#cbd5e1"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .ct{font-size:14px;font-weight:700;fill:#0f172a}
    .cd{font-size:11.5px;fill:#64748b}
    .n{font-size:12px;font-weight:800;text-anchor:middle;dominant-baseline:middle;fill:#fff}
    .core{font-size:15px;font-weight:800;text-anchor:middle;dominant-baseline:middle;fill:#fff}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .base{font-size:12px;fill:#94a3b8;text-anchor:middle}
  </style>
  <rect x="0" y="0" width="900" height="490" fill="url(#bg)"/>
  <text class="title" x="40" y="50">멀티 에이전트 시스템의 구성 요소</text>
  <text class="sub" x="40" y="74">여섯 부품이 맞물려 하나의 결과로 수렴한다</text>
  <circle cx="852" cy="44" r="16" fill="#0ea5e9"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">11</text>

  <!-- core -->
  <rect x="366" y="210" width="168" height="72" rx="16" fill="#6366f1" filter="url(#sh)"/>
  <text class="core" x="450" y="238">멀티 에이전트</text><text class="core" x="450" y="258" font-size="13">시스템</text>

  <!-- left cards -->
  <g>
    <rect x="40" y="110" width="288" height="64" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="70" cy="142" r="14" fill="#2563eb"/><text class="n" x="70" y="143">1</text>
    <text class="ct" x="96" y="138">오케스트레이터 / 코디네이터</text><text class="cd" x="96" y="157">작업을 쪼개 분배하고 진행 관리</text>
    <path d="M328 150 L364 220" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="40" y="204" width="288" height="64" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="70" cy="236" r="14" fill="#16a34a"/><text class="n" x="70" y="237">2</text>
    <text class="ct" x="96" y="232">워커 / 전문 에이전트</text><text class="cd" x="96" y="251">실제 하위 작업을 수행</text>
    <path d="M328 240 L364 244" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="40" y="298" width="288" height="64" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="70" cy="330" r="14" fill="#d97706"/><text class="n" x="70" y="331">3</text>
    <text class="ct" x="96" y="326">공유 상태 / 메모리</text><text class="cd" x="96" y="345">Task List · 파일시스템 · git</text>
    <path d="M328 330 L364 272" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <!-- right cards -->
  <g>
    <rect x="572" y="110" width="288" height="64" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="830" cy="142" r="14" fill="#0ea5e9"/><text class="n" x="830" y="143">4</text>
    <text class="ct" x="600" y="138">통신 (메시징)</text><text class="cd" x="600" y="157">Mailbox · 요약 보고</text>
    <path d="M572 150 L536 220" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="572" y="204" width="288" height="64" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="830" cy="236" r="14" fill="#db2777"/><text class="n" x="830" y="237">5</text>
    <text class="ct" x="600" y="232">검증기 (Verifier / Critic)</text><text class="cd" x="600" y="251">결과를 독립적으로 확인</text>
    <path d="M572 240 L536 244" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <g>
    <rect x="572" y="298" width="288" height="64" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="830" cy="330" r="14" fill="#64748b"/><text class="n" x="830" y="331">6</text>
    <text class="ct" x="600" y="326">종료 조건</text><text class="cd" x="600" y="345">목표 충족 · 테스트 통과 · 최대 반복</text>
    <path d="M572 330 L536 272" stroke="#cbd5e1" stroke-width="1.5" marker-end="url(#a)"/>
  </g>

  <text class="base" x="450" y="400">분배(1) + 실행(2) + 맥락 공유(3) + 전달(4) + 확인(5) + 멈춤(6)</text>

  <!-- footer -->
  <circle cx="46" cy="462" r="11" fill="#0ea5e9"/><text x="46" y="463" class="fp" fill="#fff" font-size="11">11</text>
  <rect x="66" y="459" width="60" height="5" rx="2.5" fill="#0ea5e9"/><rect x="130" y="459" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="466" text-anchor="end">Claude 정리 노트 · 멀티 에이전트 시스템</text>
</svg>
