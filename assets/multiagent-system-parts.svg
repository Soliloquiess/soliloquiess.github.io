<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ar3" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#6e7681"/></marker>
  </defs>
  <style>
    .h{font-size:19px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .cap{font-size:13px;text-anchor:middle;fill:#8b949e}
    .core{font-size:15px;font-weight:700;text-anchor:middle;dominant-baseline:middle;fill:#e2d4ff}
    .ct{font-size:13.5px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .cd{font-size:11.5px;text-anchor:middle;fill:#8b949e}
    .n{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle;fill:#0d1117}
  </style>
  <rect x="0" y="0" width="900" height="420" fill="#0d1117"/>
  <text class="h" x="450" y="36">멀티 에이전트 시스템의 구성 요소</text>
  <text class="cap" x="450" y="56">여섯 부품이 맞물려 하나의 결과로 수렴한다</text>

  <!-- core -->
  <rect x="360" y="186" width="180" height="60" rx="12" fill="#2d2140" stroke="#a371f7" stroke-width="1.5"/>
  <text class="core" x="450" y="210">멀티 에이전트</text>
  <text class="core" x="450" y="230" font-size="13" fill="#d2a8ff">시스템</text>

  <!-- component card generator: 6 around -->
  <!-- top-left: 오케스트레이터 -->
  <g>
    <rect x="70" y="96" width="220" height="66" rx="10" fill="#161b22" stroke="#4a9eff"/>
    <circle cx="94" cy="120" r="11" fill="#4a9eff"/><text class="n" x="94" y="121">1</text>
    <text class="ct" x="186" y="120" text-anchor="middle">오케스트레이터 / 코디네이터</text>
    <text class="cd" x="186" y="142">작업을 쪼개 분배하고 진행 관리</text>
    <line x1="290" y1="150" x2="358" y2="196" stroke="#6e7681" marker-end="url(#ar3)"/>
  </g>
  <!-- mid-left: 워커 -->
  <g>
    <rect x="70" y="188" width="220" height="66" rx="10" fill="#161b22" stroke="#3fb950"/>
    <circle cx="94" cy="212" r="11" fill="#3fb950"/><text class="n" x="94" y="213">2</text>
    <text class="ct" x="186" y="212" text-anchor="middle">워커 / 전문 에이전트</text>
    <text class="cd" x="186" y="234">실제 하위 작업을 수행</text>
    <line x1="290" y1="216" x2="358" y2="216" stroke="#6e7681" marker-end="url(#ar3)"/>
  </g>
  <!-- bot-left: 공유 상태 -->
  <g>
    <rect x="70" y="280" width="220" height="66" rx="10" fill="#161b22" stroke="#d29922"/>
    <circle cx="94" cy="304" r="11" fill="#d29922"/><text class="n" x="94" y="305">3</text>
    <text class="ct" x="186" y="304" text-anchor="middle">공유 상태 / 메모리</text>
    <text class="cd" x="186" y="326">Task List · 파일시스템 · git</text>
    <line x1="290" y1="298" x2="358" y2="240" stroke="#6e7681" marker-end="url(#ar3)"/>
  </g>
  <!-- top-right: 통신 -->
  <g>
    <rect x="610" y="96" width="220" height="66" rx="10" fill="#161b22" stroke="#58a6ff"/>
    <circle cx="806" cy="120" r="11" fill="#58a6ff"/><text class="n" x="806" y="121">4</text>
    <text class="ct" x="712" y="120" text-anchor="middle">통신 (메시징)</text>
    <text class="cd" x="712" y="142">Mailbox · 요약 보고</text>
    <line x1="610" y1="150" x2="542" y2="196" stroke="#6e7681" marker-end="url(#ar3)"/>
  </g>
  <!-- mid-right: 검증기 -->
  <g>
    <rect x="610" y="188" width="220" height="66" rx="10" fill="#161b22" stroke="#db61a2"/>
    <circle cx="806" cy="212" r="11" fill="#db61a2"/><text class="n" x="806" y="213">5</text>
    <text class="ct" x="712" y="212" text-anchor="middle">검증기 (Verifier / Critic)</text>
    <text class="cd" x="712" y="234">결과를 독립적으로 확인</text>
    <line x1="610" y1="216" x2="542" y2="216" stroke="#6e7681" marker-end="url(#ar3)"/>
  </g>
  <!-- bot-right: 종료 조건 -->
  <g>
    <rect x="610" y="280" width="220" height="66" rx="10" fill="#161b22" stroke="#8b949e"/>
    <circle cx="806" cy="304" r="11" fill="#8b949e"/><text class="n" x="806" y="305">6</text>
    <text class="ct" x="712" y="304" text-anchor="middle">종료 조건</text>
    <text class="cd" x="712" y="326">목표 충족 · 테스트 통과 · 최대 반복</text>
    <line x1="610" y1="298" x2="542" y2="240" stroke="#6e7681" marker-end="url(#ar3)"/>
  </g>

  <text class="cap" x="450" y="384" fill="#6e7681">분배(1) + 실행(2) + 맥락 공유(3) + 전달(4) + 확인(5) + 멈춤(6)</text>
</svg>
