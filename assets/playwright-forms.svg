<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .hd{font-size:15px;font-weight:800;text-anchor:middle}
    .hs{font-size:11px;text-anchor:middle}
    .rl{font-size:11.5px;font-weight:700;fill:#64748b;text-anchor:middle}
    .v{font-size:11.5px;fill:#334155;text-anchor:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">Playwright vs MCP vs CLI</text>
  <text class="sub" x="40" y="74">같은 Playwright 코어, 세 가지 형태 — 핵심은 "상태가 어디 사는가"</text>
  <circle cx="852" cy="44" r="16" fill="#16a34a"/><text x="852" y="45" class="fp" fill="#fff" font-size="12">33</text>

  <!-- 3 column headers -->
  <rect x="40" y="100" width="260" height="56" rx="14" fill="#f0fdf4" stroke="#bbf7d0" filter="url(#sh)"/><text class="hd" x="170" y="124" fill="#15803d">라이브러리</text><text class="hs" x="170" y="143" fill="#16a34a">코드로 스크립트 작성</text>
  <rect x="320" y="100" width="260" height="56" rx="14" fill="#eff6ff" stroke="#bfdbfe" filter="url(#sh)"/><text class="hd" x="450" y="124" fill="#1d4ed8">Playwright MCP</text><text class="hs" x="450" y="143" fill="#2563eb">@playwright/mcp</text>
  <rect x="600" y="100" width="260" height="56" rx="14" fill="#f5f3ff" stroke="#ddd6fe" filter="url(#sh)"/><text class="hd" x="730" y="124" fill="#7c3aed">Playwright CLI</text><text class="hs" x="730" y="143" fill="#9333ea">@playwright/cli · 2026 초</text>

  <!-- rows -->
  <text class="rl" x="170" y="184" fill="#94a3b8" font-size="10.5">상태 위치</text>
  <text class="rl" x="450" y="184" fill="#94a3b8" font-size="10.5">상태 위치</text>
  <text class="rl" x="730" y="184" fill="#94a3b8" font-size="10.5">상태 위치</text>
  <rect x="60" y="192" width="220" height="30" rx="8" fill="#fff" stroke="#e2e8f0"/><text class="v" x="170" y="211" font-weight="700">코드 · 파일</text>
  <rect x="340" y="192" width="220" height="30" rx="8" fill="#fff" stroke="#e2e8f0"/><text class="v" x="450" y="211" font-weight="700">LLM 컨텍스트</text>
  <rect x="620" y="192" width="220" height="30" rx="8" fill="#fff" stroke="#e2e8f0"/><text class="v" x="730" y="211" font-weight="700">디스크(YAML 경로)</text>

  <!-- detail rows -->
  <text class="v" x="170" y="252">사람이 작성 → 반복 실행</text>
  <text class="v" x="170" y="274">재사용 가능한 자산</text>
  <text class="v" x="450" y="252">접근성 스냅샷 기반</text>
  <text class="v" x="450" y="274">스크린샷·비전 모델 불필요</text>
  <text class="v" x="730" y="252">셸 명령으로 조작</text>
  <text class="v" x="730" y="274">파일 경로만 컨텍스트에</text>

  <!-- token bar -->
  <text class="rl" x="450" y="312">토큰 효율 (10단계 작업 예시)</text>
  <rect x="340" y="322" width="220" height="30" rx="8" fill="#fef2f2"/><text class="v" x="450" y="341" fill="#e11d48" font-weight="700">~114k (큼)</text>
  <rect x="620" y="322" width="220" height="30" rx="8" fill="#f0fdf4"/><text class="v" x="730" y="341" fill="#16a34a" font-weight="700">~27k (약 1/4)</text>
  <text class="v" x="170" y="341" font-size="10.5" fill="#94a3b8">(스크립트에 고정)</text>

  <!-- guide -->
  <rect x="40" y="370" width="820" height="60" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="v" x="450" y="393" font-size="12.5">재사용 스크립트 → <tspan fill="#15803d" font-weight="800">라이브러리</tspan> · 탐색적 에이전트 루프 → <tspan fill="#1d4ed8" font-weight="800">MCP</tspan> · 고처리·토큰 절약 → <tspan fill="#7c3aed" font-weight="800">CLI</tspan></text>
  <text class="v" x="450" y="416" font-size="11" fill="#94a3b8">최근엔 "MCP → CLI로 무게중심 이동" 흐름도 언급됨</text>

  <!-- footer -->
  <circle cx="46" cy="450" r="11" fill="#16a34a"/><text x="46" y="451" class="fp" fill="#fff" font-size="11">33</text>
  <rect x="66" y="447" width="60" height="5" rx="2.5" fill="#16a34a"/><rect x="130" y="447" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="454" text-anchor="end">Claude 정리 노트 · Playwright 세 형태</text>
</svg>
