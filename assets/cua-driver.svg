<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:13px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:10.5px;fill:#64748b;text-anchor:middle}
    .chip{font-size:11.5px;font-weight:600;text-anchor:middle;dominant-baseline:middle}
    .ct{font-size:12.5px;font-weight:700;fill:#0f172a}
    .cd{font-size:10.5px;fill:#64748b}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">cua-driver</text>
  <text class="sub" x="40" y="74">브라우저를 넘어 네이티브 데스크톱 앱까지 — 백그라운드 컴퓨터-사용 드라이버 (trycua)</text>
  <circle cx="852" cy="44" r="16" fill="#0891b2"/><text x="852" y="45" class="fp" fill="#fff" font-size="12">35</text>

  <!-- flow: agent -> MCP/CLI -> driver -> apps -->
  <rect x="40" y="118" width="170" height="72" rx="14" fill="#f5f3ff" stroke="#ddd6fe" filter="url(#sh)"/><text class="bt" x="125" y="146">코딩 에이전트</text><text class="bs" x="125" y="168">Claude Code·Cursor·Codex</text>
  <rect x="272" y="118" width="150" height="72" rx="14" fill="#dbeafe" stroke="#bfdbfe" filter="url(#sh)"/><text class="bt" x="347" y="146">MCP / CLI</text><text class="bs" x="347" y="168">동일 표면(두 방식)</text>
  <rect x="484" y="118" width="150" height="72" rx="14" fill="#cffafe" stroke="#a5f3fc" filter="url(#sh)"/><text class="bt" x="559" y="146">cua-driver</text><text class="bs" x="559" y="168">백그라운드 드라이버</text>
  <rect x="696" y="118" width="164" height="72" rx="14" fill="#eff6ff" stroke="#bfdbfe" filter="url(#sh)"/><text class="bt" x="778" y="146">네이티브 데스크톱 앱</text><text class="bs" x="778" y="168">브라우저 아닌 실제 앱들</text>
  <path d="M210 154 L270 154" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <path d="M422 154 L482 154" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <path d="M634 154 L694 154" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- key differentiator -->
  <rect x="40" y="210" width="400" height="54" rx="12" fill="#ecfeff" stroke="#a5f3fc"/>
  <text class="bt" x="240" y="234" fill="#0e7490">★ 커서·포커스를 빼앗지 않음</text>
  <text class="bs" x="240" y="253" fill="#0891b2">사람이 컴퓨터를 그대로 쓰는 동안 백그라운드로 조작</text>
  <!-- capabilities -->
  <rect x="456" y="210" width="404" height="54" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="bt" x="658" y="234">기능</text>
  <text class="bs" x="658" y="253">클릭·입력·스크롤 · 접근성 트리 조회 · 창 상태 캡처</text>

  <!-- platforms -->
  <text class="ct" x="40" y="298">크로스 플랫폼 (컴퓨터 플릿 스케일)</text>
  <rect x="40" y="308" width="110" height="30" rx="15" fill="#e0f2fe"/><text class="chip" x="95" y="324" fill="#0369a1">macOS</text>
  <rect x="158" y="308" width="110" height="30" rx="15" fill="#e0f2fe"/><text class="chip" x="213" y="324" fill="#0369a1">Windows</text>
  <rect x="276" y="308" width="110" height="30" rx="15" fill="#e0f2fe"/><text class="chip" x="331" y="324" fill="#0369a1">Linux</text>
  <rect x="394" y="308" width="110" height="30" rx="15" fill="#e0f2fe"/><text class="chip" x="449" y="324" fill="#0369a1">Android</text>

  <!-- Cua stack -->
  <text class="ct" x="40" y="368">더 큰 Cua 인프라의 일부</text>
  <rect x="40" y="378" width="196" height="44" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="ct" x="138" y="398" text-anchor="middle" font-size="12">cua-driver</text><text class="cd" x="138" y="414" text-anchor="middle">드라이버 (이 섹션)</text>
  <rect x="244" y="378" width="196" height="44" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="ct" x="342" y="398" text-anchor="middle" font-size="12">cua-agent</text><text class="cd" x="342" y="414" text-anchor="middle">에이전트 프레임워크</text>
  <rect x="448" y="378" width="196" height="44" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="ct" x="546" y="398" text-anchor="middle" font-size="12">cua-sandbox</text><text class="cd" x="546" y="414" text-anchor="middle">샌드박스 SDK</text>
  <rect x="652" y="378" width="208" height="44" rx="12" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="ct" x="756" y="398" text-anchor="middle" font-size="12">cua-bench</text><text class="cd" x="756" y="414" text-anchor="middle">벤치마크·RL 환경</text>

  <text class="bs" x="450" y="444" fill="#94a3b8" text-anchor="middle">제어 표면의 확장: CDP(30) → Playwright(32) → Browser Harness(34, 브라우저) → cua-driver(35, 데스크톱 전체)</text>

  <!-- footer -->
  <circle cx="46" cy="454" r="11" fill="#0891b2"/><text x="46" y="455" class="fp" fill="#fff" font-size="11">35</text>
  <rect x="66" y="451" width="60" height="5" rx="2.5" fill="#0891b2"/><rect x="130" y="451" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="458" text-anchor="end">Claude 정리 노트 · cua-driver</text>
</svg>
