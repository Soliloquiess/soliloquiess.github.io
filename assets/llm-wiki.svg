<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="w" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#14b8a6"/></marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:13.5px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:11px;fill:#64748b;text-anchor:middle}
    .core{font-size:18px;font-weight:800;fill:#fff;text-anchor:middle}
    .cs{font-size:12.5px;fill:#ccfbf1;text-anchor:middle}
    .pill{font-size:12px;font-weight:600;text-anchor:middle;dominant-baseline:middle;fill:#0f766e}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect x="0" y="0" width="900" height="460" fill="url(#bg)"/>
  <text class="title" x="40" y="50">연구 과정·결과 기록 — LLM Wiki</text>
  <text class="sub" x="40" y="74">세션이 사라져도 지식은 축적된다 (OMC 플러그인 · "Karpathy 모델")</text>
  <circle cx="852" cy="44" r="16" fill="#14b8a6"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">21</text>

  <!-- sessions -->
  <g>
    <rect x="70" y="112" width="180" height="66" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="160" y="140">세션 1</text><text class="bs" x="160" y="160">끝나면 컨텍스트 소멸</text>
    <rect x="360" y="112" width="180" height="66" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="450" y="140">세션 2</text><text class="bs" x="450" y="160">새 컨텍스트로 시작</text>
    <rect x="650" y="112" width="180" height="66" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="740" y="140">세션 3</text><text class="bs" x="740" y="160">이전 기억 없음</text>
  </g>
  <!-- write down (teal), read up (dashed gray) -->
  <path d="M150 178 L280 246" stroke="#14b8a6" stroke-width="2" marker-end="url(#w)"/>
  <path d="M450 178 L450 246" stroke="#14b8a6" stroke-width="2" marker-end="url(#w)"/>
  <path d="M750 178 L620 246" stroke="#14b8a6" stroke-width="2" marker-end="url(#w)"/>
  <path d="M330 246 C300 210, 220 200, 175 180" fill="none" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="4 3" marker-end="url(#r)"/>
  <text x="250" y="222" font-size="11" fill="#0f766e" font-weight="700">기록(write)</text>
  <text x="560" y="222" font-size="11" fill="#94a3b8">재사용(read) ↖</text>

  <!-- wiki store -->
  <rect x="250" y="250" width="400" height="86" rx="16" fill="#0d9488" filter="url(#sh)"/>
  <text class="core" x="450" y="286">LLM Wiki</text>
  <text class="cs" x="450" y="312">세션을 넘나드는 영속 마크다운 지식 베이스</text>

  <!-- op pills -->
  <rect x="196" y="360" width="120" height="30" rx="15" fill="#ccfbf1"/><text class="pill" x="256" y="376">추가 (wiki_add)</text>
  <rect x="326" y="360" width="130" height="30" rx="15" fill="#ccfbf1"/><text class="pill" x="391" y="376">질의 (wiki_query)</text>
  <rect x="466" y="360" width="130" height="30" rx="15" fill="#ccfbf1"/><text class="pill" x="531" y="376">흡수 (wiki_ingest)</text>
  <rect x="606" y="360" width="118" height="30" rx="15" fill="#ccfbf1"/><text class="pill" x="665" y="376">정리 (wiki_lint)</text>

  <text class="bs" x="450" y="416" fill="#94a3b8">Ralph·AutoResearch 루프의 "외부 기억"을 연구 지식 관점으로 체계화한 층</text>

  <!-- footer -->
  <circle cx="46" cy="432" r="11" fill="#14b8a6"/><text x="46" y="433" class="fp" fill="#fff" font-size="11">21</text>
  <rect x="66" y="429" width="60" height="5" rx="2.5" fill="#14b8a6"/><rect x="130" y="429" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="436" text-anchor="end">Claude 정리 노트 · LLM Wiki</text>
</svg>
