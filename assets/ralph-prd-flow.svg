<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arp" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <style>
    .h{font-size:19px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .cap{font-size:13px;text-anchor:middle;fill:#8b949e}
    .bt{font-size:13px;font-weight:700;text-anchor:middle;dominant-baseline:middle;fill:#e6edf3}
    .bs{font-size:10.5px;text-anchor:middle;fill:#8b949e}
    .lb{font-size:11.5px;font-weight:700;text-anchor:middle;fill:#adbac7}
  </style>
  <rect x="0" y="0" width="900" height="440" fill="#0d1117"/>
  <text class="h" x="450" y="36">Ralph 실행 흐름 — PRD 작성부터 자율 루프까지</text>

  <!-- prep column (사람) -->
  <rect x="40" y="64" width="200" height="24" rx="6" fill="#1c2a3a"/><text class="lb" x="140" y="80" fill="#79c0ff">사람이 준비 (파트 A)</text>
  <g>
    <rect x="60" y="100" width="160" height="56" rx="10" fill="#161b22" stroke="#4a9eff"/>
    <text class="bt" x="140" y="122">① PRD 작성</text>
    <text class="bs" x="140" y="142">무엇을 만들지 정의</text>
  </g>
  <g>
    <rect x="60" y="182" width="160" height="56" rx="10" fill="#161b22" stroke="#4a9eff"/>
    <text class="bt" x="140" y="204">② prd.json 분해</text>
    <text class="bs" x="140" y="224">작은 user story로</text>
  </g>
  <g>
    <rect x="60" y="264" width="160" height="56" rx="10" fill="#161b22" stroke="#a371f7"/>
    <text class="bt" x="140" y="286">③ ralph.sh 실행</text>
    <text class="bs" x="140" y="306">자율 루프 시작</text>
  </g>
  <line x1="140" y1="156" x2="140" y2="180" stroke="#8b949e" marker-end="url(#arp)"/>
  <line x1="140" y1="238" x2="140" y2="262" stroke="#8b949e" marker-end="url(#arp)"/>

  <!-- loop column (에이전트) -->
  <rect x="300" y="64" width="360" height="24" rx="6" fill="#12251a"/><text class="lb" x="480" y="80" fill="#7ee787">에이전트가 반복 (자율 루프)</text>
  <g>
    <rect x="300" y="100" width="170" height="52" rx="10" fill="#161b22" stroke="#3fb950"/>
    <text class="bt" x="385" y="120">스토리 선택</text>
    <text class="bs" x="385" y="140">passes:false 하나</text>
  </g>
  <g>
    <rect x="490" y="100" width="170" height="52" rx="10" fill="#161b22" stroke="#3fb950"/>
    <text class="bt" x="575" y="120">구현 · 테스트</text>
    <text class="bs" x="575" y="140">코드 작성 후 실행</text>
  </g>
  <g>
    <rect x="490" y="182" width="170" height="52" rx="10" fill="#161b22" stroke="#3fb950"/>
    <text class="bt" x="575" y="202">커밋 · 갱신</text>
    <text class="bs" x="575" y="222">통과 시 passes:true</text>
  </g>
  <g>
    <rect x="300" y="182" width="170" height="52" rx="10" fill="#161b22" stroke="#3fb950"/>
    <text class="bt" x="385" y="202">진행 기록</text>
    <text class="bs" x="385" y="222">progress.txt에 학습</text>
  </g>
  <!-- loop arrows -->
  <line x1="470" y1="126" x2="488" y2="126" stroke="#8b949e" marker-end="url(#arp)"/>
  <line x1="575" y1="152" x2="575" y2="180" stroke="#8b949e" marker-end="url(#arp)"/>
  <line x1="490" y1="208" x2="472" y2="208" stroke="#8b949e" marker-end="url(#arp)"/>
  <line x1="385" y1="182" x2="385" y2="154" stroke="#8b949e" marker-end="url(#arp)"/>
  <text class="bs" x="240" y="123" fill="#6e7681">시작 →</text>
  <line x1="220" y1="292" x2="300" y2="292" stroke="#8b949e" marker-end="url(#arp)"/>
  <path d="M300 292 C260 292, 260 126, 298 126" fill="none" stroke="#8b949e" stroke-dasharray="4 3" marker-end="url(#arp)"/>

  <!-- decision -->
  <g>
    <rect x="330" y="286" width="120" height="48" rx="10" fill="#161b22" stroke="#d29922"/>
    <text class="bt" x="390" y="314">남은 스토리?</text>
  </g>
  <line x1="385" y1="234" x2="385" y2="284" stroke="#8b949e" marker-end="url(#arp)"/>
  <path d="M330 310 C260 310, 260 152, 298 130" fill="none" stroke="#3fb950" stroke-dasharray="4 3" marker-end="url(#arp)"/>
  <text class="bs" x="268" y="240" fill="#7ee787" font-weight="700">Yes ↑</text>

  <!-- done -->
  <g>
    <rect x="510" y="286" width="140" height="48" rx="10" fill="#12251a" stroke="#2ea043"/>
    <text class="bt" x="580" y="314" fill="#7ee787">완료!</text>
  </g>
  <line x1="450" y1="310" x2="508" y2="310" stroke="#8b949e" marker-end="url(#arp)"/>
  <text class="bs" x="480" y="302" fill="#8b949e">No</text>

  <text class="cap" x="450" y="386">매 반복이 남긴 상태(코드·커밋·progress)를 다음 반복이 이어받는다 — 기억은 파일·git이 담당</text>
  <text class="cap" x="450" y="410" fill="#6e7681">PRD·prd.json·완료 조건이 명확할수록 루프가 헤매지 않고 수렴한다</text>
</svg>
