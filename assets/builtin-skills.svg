<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .ct{font-size:14px;font-weight:700;fill:#0f172a}
    .cd{font-size:11px;fill:#64748b}
    .badge{font-size:10.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .kp{font-size:12px;fill:#334155}
    .code{font-family:'Consolas','Courier New',monospace;font-size:11.5px;fill:#475569}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">Claude Code의 Built-in 스킬</text>
  <text class="sub" x="40" y="74">기본 내장(bundled) · 사용자 · 프로젝트 · 플러그인 — 네 갈래</text>
  <rect x="726" y="30" width="132" height="28" rx="14" fill="#dbeafe"/><text class="badge" x="792" y="45" fill="#1d4ed8">Claude Code native</text>

  <!-- 4 type cards -->
  <rect x="40" y="104" width="200" height="96" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="56" y="118" width="86" height="24" rx="12" fill="#dbeafe"/><text class="badge" x="99" y="131" fill="#1d4ed8">Bundled</text>
  <text class="ct" x="56" y="162">기본 내장</text><text class="cd" x="56" y="181">모든 세션 · /code-review /verify /loop</text>
  <rect x="256" y="104" width="200" height="96" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="272" y="118" width="86" height="24" rx="12" fill="#dcfce7"/><text class="badge" x="315" y="131" fill="#15803d">User</text>
  <text class="ct" x="272" y="162">사용자 스킬</text><text class="cd" x="272" y="181">~/.claude/skills/ · 모든 프로젝트</text>
  <rect x="472" y="104" width="200" height="96" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="488" y="118" width="86" height="24" rx="12" fill="#fef3c7"/><text class="badge" x="531" y="131" fill="#b45309">Project</text>
  <text class="ct" x="488" y="162">프로젝트 스킬</text><text class="cd" x="488" y="181">.claude/skills/ · 현 프로젝트만</text>
  <rect x="688" y="104" width="172" height="96" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="704" y="118" width="86" height="24" rx="12" fill="#f5f3ff"/><text class="badge" x="747" y="131" fill="#7c3aed">Plugin</text>
  <text class="ct" x="704" y="162">플러그인 스킬</text><text class="cd" x="704" y="181">플러그인 skills/ · 예: OMC</text>

  <!-- progressive disclosure -->
  <rect x="40" y="222" width="820" height="120" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="ct" x="60" y="250">SKILL.md 구조 · 점진적 로딩 (Progressive Disclosure)</text>
  <rect x="60" y="266" width="360" height="30" rx="8" fill="#ecfdf5"/><text class="code" x="76" y="285" fill="#047857">frontmatter: name · description  → 항상 컨텍스트에</text>
  <rect x="60" y="302" width="360" height="30" rx="8" fill="#f1f5f9"/><text class="code" x="76" y="321" fill="#475569">본문(Markdown 지침)  → 호출할 때만 로드</text>
  <text class="kp" x="440" y="286">• description을 Claude가 문맥과 <tspan fill="#2563eb" font-weight="700">자동 매칭</tspan>해 트리거</text>
  <text class="kp" x="440" y="310">• 또는 <tspan font-family="'Consolas',monospace" fill="#2563eb">/이름</tspan> 수동 호출 (disable-model-invocation=수동 전용)</text>
  <text class="kp" x="440" y="332" fill="#64748b" font-size="11.5">→ 평소 토큰 비용 최소, 필요할 때만 펼침</text>

  <!-- big picture strip -->
  <rect x="40" y="360" width="820" height="42" rx="10" fill="#eef2ff"/>
  <text class="kp" x="60" y="386" fill="#4338ca">이 노트 기준: <tspan font-weight="700">Goal(22)</tspan>=native 기능 · <tspan font-weight="700">/loop(27)·/verify</tspan>=native bundled 스킬 · <tspan font-weight="700">autopilot·ultraqa·visual-verdict·wiki</tspan>=OMC 플러그인 스킬</text>

  <!-- footer -->
  <circle cx="46" cy="440" r="11" fill="#2563eb"/><text x="46" y="441" class="fp" fill="#fff" font-size="11">26</text>
  <rect x="66" y="437" width="60" height="5" rx="2.5" fill="#2563eb"/><rect x="130" y="437" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="444" text-anchor="end">Claude 정리 노트 · Built-in 스킬</text>
</svg>
