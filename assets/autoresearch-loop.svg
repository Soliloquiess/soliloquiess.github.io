<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/></marker>
    <marker id="r" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f87171"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:13px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:10.5px;fill:#64748b;text-anchor:middle}
    .lbl{font-size:12px;font-weight:700;text-anchor:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect x="0" y="0" width="900" height="460" fill="url(#bg)"/>
  <text class="title" x="40" y="50">Karpathy의 AutoResearch — ML 실험 자율 루프</text>
  <text class="sub" x="40" y="74">Ralph 루프를 ML 연구에 특화 · 시간당 ~12개 실험, 밤새 ~100개</text>
  <circle cx="852" cy="44" r="16" fill="#0d9488"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">19</text>

  <!-- top row -->
  <text class="lbl" x="130" y="122" fill="#2563eb">사람</text>
  <rect x="40" y="132" width="180" height="72" rx="14" fill="#eff6ff" stroke="#bfdbfe" filter="url(#sh)"/><text class="bt" x="130" y="162">program.md</text><text class="bs" x="130" y="184">사람이 쓰는 연구 방향</text>
  <rect x="256" y="132" width="164" height="72" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="338" y="160">train.py 수정</text><text class="bs" x="338" y="180">아키텍처·하이퍼파라미터</text><text class="bs" x="338" y="195">·옵티마이저·배치</text>
  <rect x="456" y="132" width="150" height="72" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="531" y="162">5분 학습</text><text class="bs" x="531" y="184">wall-clock 고정</text>
  <rect x="642" y="132" width="180" height="72" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="732" y="162">val_bpb 평가</text><text class="bs" x="732" y="184">낮을수록 개선</text>
  <path d="M220 168 L254 168" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <path d="M420 168 L454 168" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>
  <path d="M606 168 L640 168" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- decision -->
  <rect x="642" y="256" width="180" height="60" rx="14" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/><text class="bt" x="732" y="282">개선됐나?</text><text class="bs" x="732" y="301">현재 최고 기록과 비교</text>
  <path d="M732 204 L732 254" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/>

  <!-- keep -->
  <rect x="356" y="256" width="220" height="60" rx="14" fill="#f0fdf4" stroke="#86efac" filter="url(#sh)"/><text class="bt" x="466" y="282" fill="#15803d">git 커밋으로 유지</text><text class="bs" x="466" y="301" fill="#15803d">keep-if-better (언덕 오르기)</text>
  <path d="M642 286 L578 286" stroke="#4ade80" stroke-width="2" marker-end="url(#g)"/>
  <text class="lbl" x="610" y="278" fill="#16a34a">Yes</text>

  <!-- discard -->
  <rect x="642" y="360" width="180" height="46" rx="12" fill="#fef2f2" stroke="#fecaca" filter="url(#sh)"/><text class="bt" x="732" y="388" fill="#dc2626">폐기 (되돌림)</text>
  <path d="M732 316 L732 358" stroke="#f87171" stroke-width="2" marker-end="url(#r)"/>
  <text class="lbl" x="756" y="342" fill="#dc2626">No</text>

  <!-- loop back -->
  <path d="M356 280 C300 280, 300 216, 336 206" fill="none" stroke="#4ade80" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#g)"/>
  <text class="lbl" x="300" y="250" fill="#16a34a">반복</text>

  <text class="bs" x="240" y="392" fill="#94a3b8">사람은 방향·지표를 설계하고, 루프가 밤새 실험을 돌린다</text>

  <!-- footer -->
  <circle cx="46" cy="432" r="11" fill="#0d9488"/><text x="46" y="433" class="fp" fill="#fff" font-size="11">19</text>
  <rect x="66" y="429" width="60" height="5" rx="2.5" fill="#0d9488"/><rect x="130" y="429" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="436" text-anchor="end">Claude 정리 노트 · AutoResearch</text>
</svg>
