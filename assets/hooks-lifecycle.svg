<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 990" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arw" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#6e7681"/>
    </marker>
  </defs>
  <style>
    .bg{fill:#0d1117}
    .lbl{fill:#8b949e;font-size:13px}
    .cap{fill:#e6edf3;font-size:15px;font-weight:600}
    .box{rx:8;stroke-width:1.5}
    .btxt{font-size:14px;font-weight:600;dominant-baseline:middle;text-anchor:middle}
    .sub{font-size:11px;dominant-baseline:middle;text-anchor:middle}
    .sess{fill:#1c2128;stroke:#444c56}
    .prompt{fill:#0f2b46;stroke:#4a9eff}
    .tool{fill:#1a2e22;stroke:#3fb950}
    .exec{fill:#2d2140;stroke:#a371f7}
    .end{fill:#3d1d1d;stroke:#f85149}
    .cont{fill:none;stroke-dasharray:5 4}
    .flow{stroke:#6e7681;stroke-width:1.5}
    .blk{fill:#f85149;font-size:12px;font-weight:700}
    .loop{fill:#d29922;font-size:11.5px;font-style:italic}
  </style>

  <rect class="bg" x="0" y="0" width="940" height="990"/>

  <!-- Setup -->
  <rect class="box sess" x="310" y="20" width="320" height="38"/>
  <text class="btxt" x="470" y="39" fill="#adbac7">Setup <tspan class="sub" fill="#8b949e">(--init 류 실행 시만)</tspan></text>
  <line class="flow" x1="470" y1="58" x2="470" y2="82" marker-end="url(#arw)"/>

  <!-- SessionStart -->
  <rect class="box sess" x="310" y="84" width="320" height="38"/>
  <text class="btxt" x="470" y="103" fill="#adbac7">SessionStart</text>
  <line class="flow" x1="470" y1="122" x2="470" y2="150" marker-end="url(#arw)"/>

  <!-- ===== Per-Turn outer container ===== -->
  <rect class="box cont" x="40" y="152" width="860" height="700" stroke="#388bfd"/>
  <text class="cap" x="62" y="178" fill="#58a6ff">🔁 Per-Turn 루프 — 사용자 입력마다</text>

  <!-- UserPromptSubmit -->
  <rect class="box prompt" x="230" y="196" width="480" height="42"/>
  <text class="btxt" x="462" y="217" fill="#cae3ff">UserPromptSubmit → UserPromptExpansion</text>
  <text class="blk" x="694" y="217" text-anchor="end" dominant-baseline="middle">⛔</text>
  <line class="flow" x1="470" y1="238" x2="470" y2="262" marker-end="url(#arw)"/>

  <!-- ===== Agentic tool loop inner container ===== -->
  <rect class="box cont" x="90" y="266" width="760" height="452" stroke="#a371f7"/>
  <text class="cap" x="112" y="292" fill="#bc8cff" font-size="14px">🔧 Agentic 도구 루프</text>

  <!-- PreToolUse -->
  <rect class="box tool" x="230" y="308" width="480" height="40"/>
  <text class="btxt" x="470" y="328" fill="#aff5b4">PreToolUse → PermissionRequest</text>
  <text class="blk" x="694" y="328" text-anchor="end" dominant-baseline="middle">⛔</text>
  <line class="flow" x1="470" y1="348" x2="470" y2="368" marker-end="url(#arw)"/>

  <!-- 도구 실행 -->
  <rect class="box exec" x="230" y="370" width="480" height="42"/>
  <text class="btxt" x="470" y="388" fill="#e2d4ff">도구 실행</text>
  <text class="sub" x="470" y="404" fill="#b89ce0">MCP면 Elicitation / Result 중첩</text>
  <line class="flow" x1="470" y1="412" x2="470" y2="432" marker-end="url(#arw)"/>

  <!-- PostToolUse -->
  <rect class="box tool" x="230" y="434" width="480" height="40"/>
  <text class="btxt" x="470" y="454" fill="#aff5b4">PostToolUse | PostToolUseFailure</text>
  <line class="flow" x1="470" y1="474" x2="470" y2="494" marker-end="url(#arw)"/>

  <!-- Subagent -->
  <rect class="box tool" x="230" y="496" width="480" height="40"/>
  <text class="btxt" x="470" y="516" fill="#aff5b4" font-size="13px">SubagentStart/Stop · TaskCreated/Completed</text>
  <line class="flow" x1="470" y1="536" x2="470" y2="556" marker-end="url(#arw)"/>

  <!-- PostToolBatch -->
  <rect class="box tool" x="230" y="558" width="480" height="40"/>
  <text class="btxt" x="470" y="578" fill="#aff5b4">PostToolBatch</text>

  <!-- loop back (tool) -->
  <path class="flow" d="M710,578 C790,578 790,328 714,328" fill="none" marker-end="url(#arw)"/>
  <text class="loop" x="796" y="456" text-anchor="middle" transform="rotate(90 796 456)">↺ 다음 모델 호출 — 도구 더 필요 시 반복</text>

  <line class="flow" x1="470" y1="718" x2="470" y2="742" marker-end="url(#arw)"/>

  <!-- Stop -->
  <rect class="box prompt" x="230" y="744" width="480" height="42"/>
  <text class="btxt" x="462" y="765" fill="#cae3ff">Stop | StopFailure · TeammateIdle</text>
  <text class="blk" x="694" y="765" text-anchor="end" dominant-baseline="middle">⛔</text>

  <!-- loop back (turn) -->
  <path class="flow" d="M710,765 C858,765 858,217 714,217" fill="none" marker-end="url(#arw)"/>
  <text class="loop" x="874" y="491" text-anchor="middle" transform="rotate(90 874 491)">↺ 다음 프롬프트 → 위로 반복</text>

  <line class="flow" x1="470" y1="852" x2="470" y2="880" marker-end="url(#arw)"/>

  <!-- PreCompact -->
  <rect class="box sess" x="290" y="882" width="360" height="40"/>
  <text class="btxt" x="470" y="902" fill="#adbac7">PreCompact → PostCompact <tspan class="sub" fill="#8b949e">(컨텍스트 길어지면)</tspan></text>
  <line class="flow" x1="470" y1="922" x2="470" y2="946" marker-end="url(#arw)"/>

  <!-- SessionEnd -->
  <rect class="box end" x="310" y="948" width="320" height="38"/>
  <text class="btxt" x="470" y="967" fill="#ffb0ab">SessionEnd</text>
</svg>
