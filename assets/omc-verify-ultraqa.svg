<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#f59e0b"/></marker>
    <marker id="g" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4ade80"/></marker>
    <marker id="s" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:14px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:11px;fill:#64748b;text-anchor:middle}
    .lbl{font-size:12px;font-weight:700;text-anchor:middle}
    .chip{font-size:11.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .kp{font-size:12.5px;fill:#334155;text-anchor:middle}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">OMC 코드 검증과 UltraQA</text>
  <text class="sub" x="40" y="74">테스트→검증→수정을 목표 충족까지 반복하는 QA 사이클 (OMC 플러그인)</text>
  <circle cx="852" cy="44" r="16" fill="#f59e0b"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">24</text>

  <!-- UltraQA cycle -->
  <text class="lbl" x="290" y="112" fill="#b45309" text-anchor="start">UltraQA 사이클</text>
  <rect x="120" y="126" width="150" height="60" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="195" y="152">테스트</text><text class="bs" x="195" y="172">돌려서 실패 수집</text>
  <rect x="375" y="126" width="150" height="60" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="450" y="152">검증</text><text class="bs" x="450" y="172">결과가 맞는지 확인</text>
  <rect x="630" y="126" width="150" height="60" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="705" y="152">수정</text><text class="bs" x="705" y="172">실패를 고침</text>
  <path d="M270 156 L373 156" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <path d="M525 156 L628 156" stroke="#f59e0b" stroke-width="2" marker-end="url(#a)"/>
  <!-- loop back -->
  <path d="M705 186 C705 224, 195 224, 195 188" fill="none" stroke="#f59e0b" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#a)"/>
  <text class="lbl" x="450" y="216" fill="#b45309">목표(품질 기준) 충족까지 반복</text>
  <!-- exit -->
  <rect x="375" y="242" width="150" height="44" rx="12" fill="#16a34a" filter="url(#sh)"/><text class="bt" x="450" y="270" fill="#fff">목표 충족 → 완료</text>
  <path d="M450 224 L450 240" stroke="#4ade80" stroke-width="2" marker-end="url(#g)"/>

  <!-- separation of passes -->
  <rect x="120" y="312" width="660" height="72" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <rect x="146" y="332" width="150" height="34" rx="17" fill="#dbeafe"/><text class="chip" x="221" y="349" fill="#1d4ed8">작성 패스 (writer)</text>
  <path d="M300 349 L360 349" stroke="#94a3b8" stroke-width="2" marker-end="url(#s)"/>
  <rect x="364" y="332" width="160" height="34" rx="17" fill="#f5f3ff"/><text class="chip" x="444" y="349" fill="#7c3aed">검수 패스 (reviewer)</text>
  <text class="kp" x="648" y="345" font-size="11.5">같은 컨텍스트에서</text>
  <text class="kp" x="648" y="362" font-size="11.5" fill="#dc2626">자기 승인 금지</text>

  <!-- tool chips -->
  <rect x="120" y="404" width="150" height="30" rx="15" fill="#fef3c7"/><text class="chip" x="195" y="420" fill="#b45309">verifier 에이전트</text>
  <rect x="286" y="404" width="120" height="30" rx="15" fill="#fef3c7"/><text class="chip" x="346" y="420" fill="#b45309">/verify 스킬</text>
  <rect x="422" y="404" width="160" height="30" rx="15" fill="#fef3c7"/><text class="chip" x="502" y="420" fill="#b45309">code-reviewer 에이전트</text>
  <text class="bs" x="700" y="423" fill="#94a3b8">검증 층이 있어야 자율 루프가 안전 (18·20번)</text>

  <!-- footer -->
  <circle cx="46" cy="446" r="11" fill="#f59e0b"/><text x="46" y="447" class="fp" fill="#fff" font-size="11">24</text>
  <rect x="66" y="443" width="60" height="5" rx="2.5" fill="#f59e0b"/><rect x="130" y="443" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="450" text-anchor="end">Claude 정리 노트 · 검증 / UltraQA</text>
</svg>
