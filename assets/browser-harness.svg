<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="p" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a855f7"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:13px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:10.5px;fill:#64748b;text-anchor:middle}
    .loop{font-size:12px;font-weight:700;fill:#7c3aed;text-anchor:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .kp{font-size:12px;fill:#334155}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">Browser Harness란?</text>
  <text class="sub" x="40" y="74">에이전트와 실제 브라우저 사이의 가장 얇은 연결 계층 (Browser Use · CDP 직결)</text>
  <circle cx="852" cy="44" r="16" fill="#a855f7"/><text x="852" y="45" class="fp" fill="#fff" font-size="12">34</text>

  <!-- three nodes -->
  <rect x="60" y="120" width="180" height="76" rx="14" fill="#f5f3ff" stroke="#ddd6fe" filter="url(#sh)"/><text class="bt" x="150" y="150">AI 에이전트</text><text class="bs" x="150" y="172">"다음에 뭐 할까?" 판단</text>
  <rect x="360" y="120" width="180" height="76" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/><text class="bt" x="450" y="150">Browser Harness</text><text class="bs" x="450" y="172">~600줄 · 얇은 계층</text>
  <rect x="660" y="120" width="180" height="76" rx="14" fill="#eff6ff" stroke="#bfdbfe" filter="url(#sh)"/><text class="bt" x="750" y="150">실제 Chrome</text><text class="bs" x="750" y="172">CDP로 직접 제어</text>
  <path d="M240 148 L358 148" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/><text class="bs" x="299" y="140">액션</text>
  <path d="M540 168 L242 168" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/><text class="bs" x="391" y="186">스냅샷</text>
  <path d="M540 148 L658 148" stroke="#94a3b8" stroke-width="2" marker-end="url(#a)"/><text class="bs" x="599" y="140">CDP</text>

  <!-- loop steps -->
  <rect x="60" y="222" width="780" height="52" rx="12" fill="#faf5ff" stroke="#e9d5ff"/>
  <text class="loop" x="450" y="242">동작 루프 (완료까지 반복)</text>
  <text class="kp" x="450" y="263" text-anchor="middle" font-size="11.5">작업 설명 → 페이지 열고 스냅샷 → 모델에 "다음 액션?" → 클릭·입력·스크롤 실행 → 반복</text>

  <!-- self-healing -->
  <rect x="60" y="292" width="380" height="80" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="bt" x="250" y="318" fill="#7c3aed">자기치유 (self-healing)</text>
  <text class="kp" x="80" y="342" font-size="11.5">헬퍼 함수가 없으면 실패하지 않고,</text>
  <text class="kp" x="80" y="360" font-size="11.5">에이전트가 helpers.py에 raw CDP로 직접 작성해 이어감</text>

  <!-- vs playwright -->
  <rect x="460" y="292" width="380" height="80" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="bt" x="650" y="318">Playwright와의 차이</text>
  <text class="kp" x="480" y="342" font-size="11.5">Playwright = 사람이 스크립트 작성, 에이전트는 실행</text>
  <text class="kp" x="480" y="360" font-size="11.5">Harness = 에이전트가 보고 스스로 한 스텝씩 행동</text>

  <!-- link -->
  <rect x="60" y="384" width="780" height="30" rx="8" fill="#f5f3ff"/>
  <text class="kp" x="450" y="403" text-anchor="middle" fill="#6d28d9">🔗 9번 <tspan font-weight="800">하네스 엔지니어링</tspan>의 브라우저 버전 — "모델을 감싸 행동→관찰→반복시키는 실행 골격"을 브라우저 제어에 적용</text>

  <!-- footer -->
  <circle cx="46" cy="440" r="11" fill="#a855f7"/><text x="46" y="441" class="fp" fill="#fff" font-size="11">34</text>
  <rect x="66" y="437" width="60" height="5" rx="2.5" fill="#a855f7"/><rect x="130" y="437" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="444" text-anchor="end">Claude 정리 노트 · Browser Harness</text>
</svg>
