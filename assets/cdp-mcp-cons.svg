<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .ct{font-size:14px;font-weight:700;fill:#0f172a}
    .cd{font-size:11.5px;fill:#64748b}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .big{font-size:26px;font-weight:800;text-anchor:middle}
    .cap{font-size:11px;fill:#64748b;text-anchor:middle}
  </style>
  <rect x="0" y="0" width="900" height="460" fill="url(#bg)"/>
  <text class="title" x="40" y="50">CDP MCP의 단점</text>
  <text class="sub" x="40" y="74">CDP를 MCP로 감싸 브라우저를 붙이면 편하지만 — 세 가지 대가</text>
  <circle cx="852" cy="44" r="16" fill="#e11d48"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">31</text>

  <!-- 3 con cards -->
  <rect x="40" y="108" width="260" height="150" rx="16" fill="#fff" stroke="#fecaca" filter="url(#sh)"/>
  <circle cx="72" cy="142" r="16" fill="#fef2f2"/><text class="fp" x="72" y="143" fill="#e11d48" font-size="15">⚙</text>
  <text class="ct" x="100" y="140">별도 프로세스</text><text class="cd" x="100" y="159">리소스 차지</text>
  <text class="cd" x="60" y="192">브라우저를 별도 프로세스로</text>
  <text class="cd" x="60" y="212">띄워야 해 메모리·CPU를</text>
  <text class="cd" x="60" y="232">지속적으로 점유한다.</text>

  <rect x="320" y="108" width="260" height="150" rx="16" fill="#fff" stroke="#fecaca" filter="url(#sh)"/>
  <circle cx="352" cy="142" r="16" fill="#fef2f2"/><text class="fp" x="352" y="143" fill="#e11d48" font-size="15">✎</text>
  <text class="ct" x="380" y="140">코드로 남기기 어려움</text><text class="cd" x="380" y="159">재현성 낮음</text>
  <text class="cd" x="340" y="192">MCP 도구 호출은 일회성 →</text>
  <text class="cd" x="340" y="212">상태가 LLM 컨텍스트에 살고,</text>
  <text class="cd" x="340" y="232">재실행 가능한 스크립트로 안 남음.</text>

  <rect x="600" y="108" width="260" height="150" rx="16" fill="#fff" stroke="#fecaca" filter="url(#sh)"/>
  <circle cx="632" cy="142" r="16" fill="#fef2f2"/><text class="fp" x="632" y="143" fill="#e11d48" font-size="15">🪙</text>
  <text class="ct" x="660" y="140">토큰 비용</text><text class="cd" x="660" y="159">스냅샷·스키마 부담</text>
  <text class="cd" x="620" y="192">접근성 스냅샷 ~3.8~4k토큰/페이지</text>
  <text class="cd" x="620" y="212">+ 도구 스키마 부담이 매 액션마다</text>
  <text class="cd" x="620" y="232">누적된다.</text>

  <!-- token comparison -->
  <rect x="40" y="284" width="820" height="96" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <text class="ct" x="450" y="310" text-anchor="middle">같은 10단계 작업 · 토큰 비교 (보도된 예시)</text>
  <rect x="120" y="326" width="300" height="38" rx="10" fill="#fef2f2"/><text class="big" x="200" y="352" fill="#e11d48" font-size="20">~114k</text><text class="cap" x="330" y="350">MCP (매 액션 스냅샷)</text>
  <text x="450" y="352" font-size="18" fill="#94a3b8" text-anchor="middle">vs</text>
  <rect x="480" y="326" width="300" height="38" rx="10" fill="#f0fdf4"/><text class="big" x="556" y="352" fill="#16a34a" font-size="20">~27k</text><text class="cap" x="686" y="350">CLI (약 4배 절감)</text>

  <text class="sub" x="40" y="410" font-size="12.5" fill="#475569">→ 그래서 대안이 나온다: Playwright(32) · Playwright CLI(33) · Browser Harness(34)</text>

  <!-- footer -->
  <circle cx="46" cy="432" r="11" fill="#e11d48"/><text x="46" y="433" class="fp" fill="#fff" font-size="11">31</text>
  <rect x="66" y="429" width="60" height="5" rx="2.5" fill="#e11d48"/><rect x="130" y="429" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="436" text-anchor="end">Claude 정리 노트 · CDP MCP 단점</text>
</svg>
