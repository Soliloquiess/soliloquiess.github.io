<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ar2" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#58a6ff"/></marker>
  </defs>
  <style>
    .h{font-size:19px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .st{font-size:16px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .tag{font-size:11.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .sub{font-size:12px;text-anchor:middle;fill:#8b949e}
    .li{font-size:12px;text-anchor:middle;fill:#adbac7}
    .q{font-size:14.5px;font-weight:600;text-anchor:middle;fill:#cae3ff}
  </style>
  <rect x="0" y="0" width="900" height="400" fill="#0d1117"/>
  <text class="h" x="450" y="38">프롬프트 → 하네스 → 루프 엔지니어링으로의 진화</text>

  <!-- Stage 1 -->
  <rect x="34" y="66" width="256" height="200" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="136" y="82" width="52" height="24" rx="12" fill="#21262d" stroke="#6e7681"/><text class="tag" x="162" y="95" fill="#adbac7">과거</text>
  <text class="st" x="162" y="130">프롬프트 엔지니어링</text>
  <text class="sub" x="162" y="152">대화형 (Ping-Pong)</text>
  <text class="li" x="162" y="182">한 번의 지시문을 잘 쓰기</text>
  <text class="li" x="162" y="204">시키고 · 답 읽고 · 다시 시키고</text>
  <text class="li" x="162" y="226">매 턴마다 사람이 직접 개입</text>
  <text class="sub" x="162" y="254" fill="#6e7681">다루는 대상: 한 번의 지시</text>

  <!-- Stage 2 -->
  <rect x="322" y="66" width="256" height="200" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="424" y="82" width="52" height="24" rx="12" fill="#1c2a3a" stroke="#4a9eff"/><text class="tag" x="450" y="95" fill="#79c0ff">중간</text>
  <text class="st" x="450" y="130">하네스 엔지니어링</text>
  <text class="sub" x="450" y="152">스킬형 (Skills / Harness)</text>
  <text class="li" x="450" y="182">모델을 감싸는 실행 골격 설계</text>
  <text class="li" x="450" y="204">입력→도구 사용→검증→반복</text>
  <text class="li" x="450" y="226">에이전트가 알아서 수행</text>
  <text class="sub" x="450" y="254" fill="#6e7681">다루는 대상: 실행 골격 전체</text>

  <!-- Stage 3 -->
  <rect x="610" y="66" width="256" height="200" rx="12" fill="#161b22" stroke="#30363d"/>
  <rect x="712" y="82" width="52" height="24" rx="12" fill="#2d2140" stroke="#a371f7"/><text class="tag" x="738" y="95" fill="#d2a8ff">현재</text>
  <text class="st" x="738" y="130">루프 엔지니어링</text>
  <text class="sub" x="738" y="152">시스템형 (System Design)</text>
  <text class="li" x="738" y="182">골격을 목표 달성까지 반복</text>
  <text class="li" x="738" y="204">행동→관찰→결정→반복</text>
  <text class="li" x="738" y="226">"조건 충족까지 반복"만 설계</text>
  <text class="sub" x="738" y="254" fill="#6e7681">다루는 대상: 반복 구동 시스템</text>

  <!-- arrows -->
  <line x1="292" y1="166" x2="320" y2="166" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ar2)"/>
  <line x1="580" y1="166" x2="608" y2="166" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#ar2)"/>

  <!-- quote -->
  <rect x="120" y="296" width="660" height="76" rx="10" fill="#0f1b2d" stroke="#1f6feb55"/>
  <text class="q" x="450" y="326">"프롬프트를 잘 쓰는 단계에서, skills를 설계하는 단계로,</text>
  <text class="q" x="450" y="350">그리고 AI를 움직이는 시스템을 설계하는 단계로 진화한다."</text>
</svg>
