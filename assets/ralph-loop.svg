<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#60a5fa"/></marker>
    <marker id="p" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a855f7"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .bt{font-size:13.5px;font-weight:700;fill:#0f172a;text-anchor:middle}
    .bs{font-size:11px;fill:#64748b;text-anchor:middle}
    .loop{font-size:13px;font-weight:700;fill:#7c3aed;text-anchor:middle}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
    .code{font-family:'Consolas','Courier New',monospace;font-size:14px;fill:#4ade80}
    .cnum{font-family:'Consolas','Courier New',monospace;font-size:14px;fill:#475569}
    .kp{font-size:12.5px;fill:#334155}
  </style>
  <rect x="0" y="0" width="900" height="480" fill="url(#bg)"/>
  <text class="title" x="40" y="50">Ralph Loop — 동작 원리</text>
  <text class="sub" x="40" y="74">완료될 때까지 매번 새 컨텍스트로 다시 도는 단순 루프</text>
  <circle cx="852" cy="44" r="16" fill="#a855f7"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">15</text>

  <!-- loop back arrow -->
  <path d="M770 118 C770 92, 130 92, 130 118" fill="none" stroke="#a855f7" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#p)"/>
  <text class="loop" x="450" y="104">새 컨텍스트로 다시 시작 — 목표 달성까지 반복</text>

  <!-- 4 stages -->
  <g>
    <rect x="52" y="126" width="164" height="74" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="82" cy="152" r="11" fill="#2563eb"/><text class="fp" x="82" y="153" fill="#fff" font-size="11">1</text>
    <text class="bt" x="146" y="157">에이전트 실행</text><text class="bs" x="134" y="180">PROMPT.md + 저장소 확인</text>
  </g>
  <g>
    <rect x="278" y="126" width="164" height="74" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="308" cy="152" r="11" fill="#16a34a"/><text class="fp" x="308" y="153" fill="#fff" font-size="11">2</text>
    <text class="bt" x="372" y="157">작업 · 커밋</text><text class="bs" x="360" y="180">가능한 만큼 진행 · 테스트</text>
  </g>
  <g>
    <rect x="504" y="126" width="164" height="74" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="534" cy="152" r="11" fill="#d97706"/><text class="fp" x="534" y="153" fill="#fff" font-size="11">3</text>
    <text class="bt" x="598" y="157">상태 인수인계</text><text class="bs" x="586" y="180">HANDOFF.md · git 기록</text>
  </g>
  <g>
    <rect x="730" y="126" width="120" height="74" rx="14" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
    <circle cx="760" cy="152" r="11" fill="#64748b"/><text class="fp" x="760" y="153" fill="#fff" font-size="11">4</text>
    <text class="bt" x="798" y="157">검증</text><text class="bs" x="790" y="180">완료 판정</text>
  </g>
  <path d="M216 163 L276 163" stroke="#60a5fa" stroke-width="2" marker-end="url(#a)"/>
  <path d="M442 163 L502 163" stroke="#60a5fa" stroke-width="2" marker-end="url(#a)"/>
  <path d="M668 163 L728 163" stroke="#60a5fa" stroke-width="2" marker-end="url(#a)"/>

  <!-- key point -->
  <rect x="52" y="224" width="798" height="44" rx="10" fill="#eff6ff" stroke="#bfdbfe"/>
  <text class="kp" x="74" y="251">핵심: 매 회차 <tspan fill="#2563eb" font-weight="700">깨끗한 새 컨텍스트</tspan>로 시작 → 편향·컨텍스트 길이로 인한 성능 저하 방지 (기억은 파일·git이 담당)</text>

  <!-- terminal -->
  <rect x="52" y="290" width="798" height="130" rx="12" fill="#0f172a" filter="url(#sh)"/>
  <circle cx="74" cy="312" r="5" fill="#ef4444"/><circle cx="92" cy="312" r="5" fill="#f59e0b"/><circle cx="110" cy="312" r="5" fill="#22c55e"/>
  <text x="130" y="316" font-size="11" fill="#94a3b8" font-family="'Consolas',monospace">Ralph Loop의 핵심 = Bash 루프 단 3줄</text>
  <text class="cnum" x="74" y="352">1</text><text class="code" x="98" y="352">while true; do</text>
  <text class="cnum" x="74" y="378">2</text><text class="code" x="98" y="378">  claude -p "$(cat PROMPT.md)"</text>
  <text class="cnum" x="74" y="404">3</text><text class="code" x="98" y="404">done</text>

  <!-- footer -->
  <circle cx="46" cy="452" r="11" fill="#a855f7"/><text x="46" y="453" class="fp" fill="#fff" font-size="11">15</text>
  <rect x="66" y="449" width="60" height="5" rx="2.5" fill="#a855f7"/><rect x="130" y="449" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="456" text-anchor="end">Claude 정리 노트 · Ralph Loop</text>
</svg>
