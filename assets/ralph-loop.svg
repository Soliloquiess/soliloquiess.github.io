<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <marker id="arl" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#58a6ff"/></marker>
    <marker id="arb" markerWidth="10" markerHeight="10" refX="6" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#a371f7"/></marker>
  </defs>
  <style>
    .h{font-size:19px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .cap{font-size:13px;text-anchor:middle;fill:#8b949e}
    .bt{font-size:13.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle;fill:#e6edf3}
    .bs{font-size:11px;text-anchor:middle;fill:#8b949e}
    .loop{font-size:13px;font-weight:700;text-anchor:middle;fill:#d2a8ff}
    .code{font-family:'Consolas','Courier New',monospace;font-size:14px;fill:#7ee787}
    .cnum{font-family:'Consolas','Courier New',monospace;font-size:14px;fill:#6e7681}
  </style>
  <rect x="0" y="0" width="900" height="400" fill="#0d1117"/>
  <text class="h" x="450" y="36">Ralph Loop — 동작 원리</text>
  <text class="cap" x="450" y="56">AI 에이전트를 반복 실행하는 단순한 루프</text>

  <!-- loop-back arrow (top) -->
  <path d="M770 110 C770 74, 130 74, 130 110" fill="none" stroke="#a371f7" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arb)"/>
  <text class="loop" x="450" y="70">새 컨텍스트로 다시 시작 — 목표 달성까지 반복</text>

  <!-- 4 stages -->
  <g>
    <rect x="60" y="118" width="150" height="72" rx="10" fill="#161b22" stroke="#4a9eff"/>
    <text class="bt" x="135" y="146">AI 에이전트 실행</text>
    <text class="bs" x="135" y="170">PROMPT.md + 저장소 상태 확인</text>
  </g>
  <g>
    <rect x="290" y="118" width="150" height="72" rx="10" fill="#161b22" stroke="#3fb950"/>
    <text class="bt" x="365" y="146">작업 수행 · 커밋</text>
    <text class="bs" x="365" y="170">가능한 만큼 진행 · 테스트</text>
  </g>
  <g>
    <rect x="520" y="118" width="150" height="72" rx="10" fill="#161b22" stroke="#d29922"/>
    <text class="bt" x="595" y="146">상태 인수인계</text>
    <text class="bs" x="595" y="170">HANDOFF.md · git에 기록</text>
  </g>
  <g>
    <rect x="750" y="118" width="90" height="72" rx="10" fill="#161b22" stroke="#8b949e"/>
    <text class="bt" x="795" y="146" font-size="12.5">검증</text>
    <text class="bs" x="795" y="170">완료 판정</text>
  </g>
  <line x1="210" y1="154" x2="288" y2="154" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arl)"/>
  <line x1="440" y1="154" x2="518" y2="154" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arl)"/>
  <line x1="670" y1="154" x2="748" y2="154" stroke="#58a6ff" stroke-width="1.5" marker-end="url(#arl)"/>

  <!-- key point -->
  <rect x="60" y="212" width="780" height="40" rx="8" fill="#0f1b2d" stroke="#1f6feb55"/>
  <text x="80" y="237" font-size="12.5" fill="#adbac7">핵심: 매 회차 <tspan fill="#79c0ff" font-weight="700">깨끗한 새 컨텍스트</tspan>로 시작 → 편향·컨텍스트 길이로 인한 성능 저하를 방지 (기억은 파일·git이 담당)</text>

  <!-- bash 3 lines -->
  <rect x="60" y="272" width="780" height="104" rx="10" fill="#0b0f14" stroke="#30363d"/>
  <text x="80" y="292" style="text-anchor:start" font-size="11" fill="#6e7681">Ralph Loop의 핵심 = Bash 루프 단 3줄</text>
  <text class="cnum" x="80" y="318">1</text><text class="code" x="104" y="318" text-anchor="start">while true; do</text>
  <text class="cnum" x="80" y="340">2</text><text class="code" x="104" y="340" text-anchor="start">  claude -p "$(cat PROMPT.md)"</text>
  <text class="cnum" x="80" y="362">3</text><text class="code" x="104" y="362" text-anchor="start">done</text>
</svg>
