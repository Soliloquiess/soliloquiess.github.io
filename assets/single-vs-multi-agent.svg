<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 470" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#eef4fc"/><stop offset="1" stop-color="#f8fafc"/></linearGradient>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#1e293b" flood-opacity="0.10"/></filter>
    <marker id="a" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <style>
    .title{font-size:25px;font-weight:800;fill:#0f172a}
    .sub{font-size:14px;fill:#64748b}
    .ch{font-size:17px;font-weight:800;fill:#0f172a;text-anchor:middle}
    .pill{font-size:12.5px;font-weight:600;text-anchor:middle;dominant-baseline:middle}
    .li{font-size:13px;fill:#475569}
    .foot{font-size:12px;fill:#94a3b8}
    .fp{font-size:12.5px;font-weight:700;text-anchor:middle;dominant-baseline:middle}
  </style>
  <rect x="0" y="0" width="900" height="470" fill="url(#bg)"/>
  <text class="title" x="40" y="50">싱글 에이전트 vs 멀티 에이전트</text>
  <text class="sub" x="40" y="74">복잡한 일을 처리하는 방식의 차이</text>
  <circle cx="852" cy="44" r="16" fill="#2563eb"/><text x="852" y="45" class="fp" fill="#fff" font-size="13">08</text>

  <!-- Single card -->
  <rect x="36" y="100" width="400" height="300" rx="16" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <circle cx="70" cy="138" r="17" fill="#eff6ff"/><rect x="63" y="131" width="14" height="14" rx="4" fill="#2563eb"/>
  <text class="ch" x="236" y="144">싱글 에이전트</text>
  <!-- pipeline -->
  <g>
    <rect x="60" y="176" width="74" height="30" rx="15" fill="#eff6ff"/><text class="pill" x="97" y="192" fill="#1d4ed8">해석</text>
    <text x="142" y="196" font-size="16" fill="#93c5fd" text-anchor="middle">›</text>
    <rect x="152" y="176" width="74" height="30" rx="15" fill="#eff6ff"/><text class="pill" x="189" y="192" fill="#1d4ed8">추론</text>
    <text x="234" y="196" font-size="16" fill="#93c5fd" text-anchor="middle">›</text>
    <rect x="244" y="176" width="74" height="30" rx="15" fill="#eff6ff"/><text class="pill" x="281" y="192" fill="#1d4ed8">결정</text>
    <text x="326" y="196" font-size="16" fill="#93c5fd" text-anchor="middle">›</text>
    <rect x="336" y="176" width="74" height="30" rx="15" fill="#eff6ff"/><text class="pill" x="373" y="192" fill="#1d4ed8">실행</text>
  </g>
  <circle cx="70" cy="242" r="3.5" fill="#2563eb"/><text class="li" x="84" y="247">한 에이전트가 모든 일을 담당</text>
  <circle cx="70" cy="272" r="3.5" fill="#2563eb"/><text class="li" x="84" y="277">하나의 긴 컨텍스트에 전부 누적</text>
  <circle cx="70" cy="302" r="3.5" fill="#2563eb"/><text class="li" x="84" y="307">오류가 전체 흐름에 전파 · 확장성 한계</text>
  <rect x="60" y="342" width="352" height="38" rx="10" fill="#eff6ff"/><text class="fp" x="236" y="361" fill="#1d4ed8">✓ 적합: 단순하고 작은 작업</text>

  <!-- Multi card -->
  <rect x="464" y="100" width="400" height="300" rx="16" fill="#fff" stroke="#e2e8f0" filter="url(#sh)"/>
  <circle cx="498" cy="138" r="17" fill="#eef2ff"/><circle cx="498" cy="134" r="3" fill="#6366f1"/><circle cx="492" cy="143" r="3" fill="#6366f1"/><circle cx="504" cy="143" r="3" fill="#6366f1"/>
  <text class="ch" x="664" y="144">멀티 에이전트</text>
  <!-- orchestrator + workers -->
  <rect x="590" y="170" width="148" height="30" rx="15" fill="#eef2ff"/><text class="pill" x="664" y="186" fill="#4338ca">오케스트레이터</text>
  <g>
    <rect x="494" y="232" width="76" height="30" rx="15" fill="#f0fdf4"/><text class="pill" x="532" y="248" fill="#15803d">분석</text>
    <rect x="580" y="232" width="76" height="30" rx="15" fill="#f0fdf4"/><text class="pill" x="618" y="248" fill="#15803d">검색</text>
    <rect x="666" y="232" width="76" height="30" rx="15" fill="#f0fdf4"/><text class="pill" x="704" y="248" fill="#15803d">작성</text>
    <rect x="752" y="232" width="76" height="30" rx="15" fill="#f0fdf4"/><text class="pill" x="790" y="248" fill="#15803d">검토</text>
    <path d="M640 200 L534 230" stroke="#c7d2fe" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M658 200 L620 230" stroke="#c7d2fe" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M690 200 L702 230" stroke="#c7d2fe" stroke-width="1.5" marker-end="url(#a)"/>
    <path d="M710 200 L786 230" stroke="#c7d2fe" stroke-width="1.5" marker-end="url(#a)"/>
  </g>
  <circle cx="498" cy="292" r="3.5" fill="#6366f1"/><text class="li" x="512" y="297">역할·책임을 나눠 처리 (전문화)</text>
  <circle cx="498" cy="318" r="3.5" fill="#6366f1"/><text class="li" x="512" y="323">에이전트별 독립 컨텍스트 (격리) · 병렬·검증</text>
  <rect x="488" y="342" width="352" height="38" rx="10" fill="#eef2ff"/><text class="fp" x="664" y="361" fill="#4338ca">✓ 적합: 복잡하고 정교한 작업</text>

  <!-- footer -->
  <circle cx="46" cy="440" r="11" fill="#2563eb"/><text x="46" y="441" class="fp" fill="#fff" font-size="11">08</text>
  <rect x="66" y="437" width="60" height="5" rx="2.5" fill="#2563eb"/><rect x="130" y="437" width="24" height="5" rx="2.5" fill="#cbd5e1"/>
  <text class="foot" x="860" y="444" text-anchor="end">Claude 정리 노트 · 멀티 에이전트 오케스트레이션</text>
</svg>
