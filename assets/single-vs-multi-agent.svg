<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Segoe UI','Malgun Gothic',sans-serif">
  <defs>
    <marker id="ar" markerWidth="9" markerHeight="9" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#8b949e"/></marker>
  </defs>
  <style>
    .h{font-size:17px;font-weight:700;text-anchor:middle;fill:#e6edf3}
    .cap{font-size:13px;text-anchor:middle;fill:#8b949e}
    .chip{font-size:13px;font-weight:600;text-anchor:middle;dominant-baseline:middle;fill:#cae3ff}
    .wk{font-size:12.5px;font-weight:600;text-anchor:middle;dominant-baseline:middle;fill:#aff5b4}
    .li{font-size:12.5px;fill:#adbac7}
    .plus{font-size:14px;font-weight:700;text-anchor:middle;fill:#8b949e}
  </style>
  <rect x="0" y="0" width="900" height="400" fill="#0d1117"/>
  <text class="h" x="450" y="34" font-size="19">싱글 에이전트 vs 멀티 에이전트</text>
  <text class="cap" x="450" y="54">복잡한 일을 처리하는 방식의 차이</text>

  <!-- Single -->
  <rect x="34" y="74" width="392" height="300" rx="12" fill="#161b22" stroke="#30363d"/>
  <text class="h" x="230" y="104">싱글 에이전트</text>
  <!-- pipeline -->
  <g>
    <rect x="62" y="128" width="76" height="34" rx="8" fill="#0f2b46" stroke="#4a9eff"/><text class="chip" x="100" y="145">해석</text>
    <rect x="150" y="128" width="76" height="34" rx="8" fill="#0f2b46" stroke="#4a9eff"/><text class="chip" x="188" y="145">추론</text>
    <rect x="238" y="128" width="76" height="34" rx="8" fill="#0f2b46" stroke="#4a9eff"/><text class="chip" x="276" y="145">결정</text>
    <rect x="326" y="128" width="76" height="34" rx="8" fill="#0f2b46" stroke="#4a9eff"/><text class="chip" x="364" y="145">실행</text>
    <line x1="138" y1="145" x2="150" y2="145" stroke="#8b949e" marker-end="url(#ar)"/>
    <line x1="226" y1="145" x2="238" y2="145" stroke="#8b949e" marker-end="url(#ar)"/>
    <line x1="314" y1="145" x2="326" y2="145" stroke="#8b949e" marker-end="url(#ar)"/>
  </g>
  <text class="cap" x="230" y="192" font-style="italic">하나의 에이전트가 전 과정을 혼자 담당</text>
  <text class="li" x="66" y="228">• 한 에이전트가 모든 일을 담당</text>
  <text class="li" x="66" y="256">• 하나의 긴 컨텍스트에 전부 누적</text>
  <text class="li" x="66" y="284">• 오류가 전체 흐름에 전파될 수 있음</text>
  <text class="li" x="66" y="312">• 전문화·확장성에 한계</text>
  <rect x="62" y="330" width="340" height="30" rx="8" fill="#12251a" stroke="#2ea04366"/>
  <text class="wk" x="232" y="345" fill="#7ee787">적합: 단순하고 작은 작업</text>

  <!-- Multi -->
  <rect x="474" y="74" width="392" height="300" rx="12" fill="#161b22" stroke="#30363d"/>
  <text class="h" x="670" y="104">멀티 에이전트</text>
  <!-- orchestrator -->
  <rect x="596" y="122" width="148" height="34" rx="8" fill="#2d2140" stroke="#a371f7"/>
  <text class="chip" x="670" y="139" fill="#e2d4ff">오케스트레이터</text>
  <!-- workers -->
  <g>
    <rect x="500" y="196" width="80" height="34" rx="8" fill="#12251a" stroke="#3fb950"/><text class="wk" x="540" y="213">분석</text>
    <rect x="592" y="196" width="80" height="34" rx="8" fill="#12251a" stroke="#3fb950"/><text class="wk" x="632" y="213">검색</text>
    <rect x="684" y="196" width="80" height="34" rx="8" fill="#12251a" stroke="#3fb950"/><text class="wk" x="724" y="213">작성</text>
    <rect x="776" y="196" width="72" height="34" rx="8" fill="#12251a" stroke="#3fb950"/><text class="wk" x="812" y="213">검토</text>
    <line x1="640" y1="156" x2="545" y2="194" stroke="#8b949e" marker-end="url(#ar)"/>
    <line x1="660" y1="156" x2="632" y2="194" stroke="#8b949e" marker-end="url(#ar)"/>
    <line x1="686" y1="156" x2="720" y2="194" stroke="#8b949e" marker-end="url(#ar)"/>
    <line x1="704" y1="156" x2="808" y2="194" stroke="#8b949e" marker-end="url(#ar)"/>
  </g>
  <text class="cap" x="670" y="258" font-style="italic">역할을 나눠 분담 → 결과 통합</text>
  <text class="li" x="502" y="290">• 역할·책임을 나눠 처리 (전문화)</text>
  <text class="li" x="502" y="312">• 에이전트별 독립 컨텍스트 (격리)</text>
  <rect x="500" y="330" width="348" height="30" rx="8" fill="#12251a" stroke="#2ea04366"/>
  <text class="wk" x="674" y="345" fill="#7ee787">적합: 복잡하고 정교한 작업 · 병렬·검증</text>
</svg>
