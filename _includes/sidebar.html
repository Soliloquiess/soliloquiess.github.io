<div id="_yDrawer">
  <div id="_sidebar" class="sidebar">
    <div class="sidebar-bg" style="background-color:{{ color }};background-image:url({{ image }})"></div>

    <header class="sidebar-sticky" role="banner">
      {% assign author = site.data.authors.first[1] %}

      <div class="sidebar-about">
        <h1><a id="_title" href="{{ '/' | relative_url }}">{{ site.title }}</a></h1>
        {{ site.tagline | markdownify }}
      </div>

      <nav class="sidebar-nav heading" role="navigation">
        {% include nav.html %}
      </nav>

      <!-- 검색: 입력 후 Pagefind 검색 페이지로 이동 -->
      <form class="sidebar-search" action="{{ '/search/' | relative_url }}" method="get" role="search">
        <input type="search" name="q" placeholder="검색…" aria-label="사이트 검색" required>
        <button type="submit" aria-label="검색">⌕</button>
      </form>

      {% if author.social %}
      <div class="sidebar-social">
        {% include social.html social=author.social %}
      </div>
      {% endif %}

      <!-- 방문자 카운터 (hits.sh, 무가입 / 사이트 누적). 죽은 seeyoufarm 대체 -->
      {% assign hits_key = site.url | remove_first: 'https://' | remove_first: 'http://' %}
      <a class="sidebar-hits" href="https://hits.sh/{{ hits_key }}/"
         title="방문 통계" rel="noopener" target="_blank">
        <img src="https://hits.sh/{{ hits_key }}.svg?style=flat-square&label=%EB%B0%A9%EB%AC%B8%EC%9E%90&color=4f86aa&labelColor=555555"
             alt="누적 방문수" loading="lazy">
      </a>
    </header>
  </div>
</div>
